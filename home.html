<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotiwind - Feel The Music, Ride The Wind</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand-logo">
                <img src="Elemen/Logo/Spotiwind.png" alt="Spotiwind Logo">
                <span>Spotiwind</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Search
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    Library
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" placeholder="Search for songs, artists...">
                </div>
                <div class="user-profile">
                    <span id="userName">User</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <section class="hero-section">
                <div class="hero-card">
                    <span class="badge">Premium Feature</span>
                    <h1>Enjoy your favorite music <span class="theme-text">Without Limits</span></h1>
                    <p>Listen to HD audio and download tracks for offline use.</p>
                    <button class="btn-login" style="width: auto;">Upgrade Now</button>
                </div>
            </section>

            <section class="music-section">
                <h2 class="section-title">Recently Played</h2>
                <div class="music-grid">
                    <!-- Contoh Card Lagu -->
                    <div class="song-card">
                        <div class="song-cover"></div>
                        <div class="song-info">
                            <span class="song-name">Starlight</span>
                            <span class="artist-name">Muse</span>
                        </div>
                    </div>
                    <div class="song-card">
                        <div class="song-cover"></div>
                        <div class="song-info">
                            <span class="song-name">After Hours</span>
                            <span class="artist-name">The Weeknd</span>
                        </div>
                    </div>
                    <div class="song-card">
                        <div class="song-cover"></div>
                        <div class="song-info">
                            <span class="song-name">Midnight City</span>
                            <span class="artist-name">M83</span>
                        </div>
                    </div>
                    <div class="song-card">
                        <div class="song-cover"></div>
                        <div class="song-info">
                            <span class="song-name">Blinding Lights</span>
                            <span class="artist-name">The Weeknd</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Player Bar -->
        <div class="player-bar">
            <div class="now-playing">
                <div class="mini-cover"></div>
                <div class="mini-info"><span>Now Playing...</span></div>
            </div>
            <div class="player-controls">--- Music Player Controls ---</div>
        </div>
    </div>
</body>
</html>
